name: Build and Publish Rootfs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: rootfs-build
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate release tag
        run: echo "TAG=starboard-rootfs-$(date -u +%Y%m%d).${{ github.run_attempt }}" >> "$GITHUB_ENV"

      - name: Build rootfs
        run: bash build-rootfs.sh

      - name: Verify compat symlinks and PortMaster control dir
        run: |
          set -e
          mkdir -p /tmp/rootfs-verify
          tar xzf rootfs.tar.gz -C /tmp/rootfs-verify --wildcards \
              'usr/lib/aarch64-linux-gnu/libSDL2.so' \
              'usr/lib/aarch64-linux-gnu/libGL.so.1' \
              'usr/lib/aarch64-linux-gnu/libOpenGL.so.0' \
              'usr/lib/aarch64-linux-gnu/libGLESv2.so' \
              'opt/system/Tools/PortMaster'
          cd /tmp/rootfs-verify

          check_symlink() {
            if [ "$(readlink "$1")" != "$2" ]; then
              echo "FAIL: $1 -> $(readlink "$1") (expected -> $2)" >&2
              exit 1
            fi
            echo "ok: $1 -> $2"
          }
          check_symlink usr/lib/aarch64-linux-gnu/libSDL2.so      libSDL2-2.0.so.0
          check_symlink usr/lib/aarch64-linux-gnu/libGL.so.1      libOSMesa.so.8
          check_symlink usr/lib/aarch64-linux-gnu/libOpenGL.so.0  libOSMesa.so.8
          check_symlink usr/lib/aarch64-linux-gnu/libGLESv2.so    libGLESv2.so.2
          check_symlink opt/system/Tools/PortMaster/xdelta3       /usr/bin/xdelta3
          check_symlink opt/system/Tools/PortMaster/7zzs.aarch64  /usr/bin/7zz
          [ -d opt/system/Tools/PortMaster/libs ]  || { echo "FAIL: missing libs/" >&2; exit 1; }
          [ -d opt/system/Tools/PortMaster/utils ] || { echo "FAIL: missing utils/" >&2; exit 1; }
          echo "all PortMaster compat symlinks/dirs present"

      - name: Rename artifact
        run: mv rootfs.tar.gz starboard-rootfs.tar.gz

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" starboard-rootfs.tar.gz \
            --title "$TAG" \
            --notes "Automated rootfs build from commit ${{ github.sha }}" \
            --latest
