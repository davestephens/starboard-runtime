name: Build and Publish Rootfs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: rootfs-build
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate release tag
        run: echo "TAG=starboard-rootfs-$(date -u +%Y%m%d).${{ github.run_attempt }}" >> "$GITHUB_ENV"

      - name: Build rootfs
        run: bash build-rootfs.sh

      - name: Rename artifact
        run: mv rootfs.tar.gz starboard-rootfs.tar.gz

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" starboard-rootfs.tar.gz \
            --title "$TAG" \
            --notes "Automated rootfs build from commit ${{ github.sha }}" \
            --latest
